name: 🏁 Production — Lint, Scan, Screenshots & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false # Never cancel prod runs

jobs:
  lint-and-scan:
    name: 🔍 Lint & SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarQube needs full history

      - name: Load tool versions
        id: versions
        uses: ./.github/actions/load-tool-versions

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.versions.outputs.java-version }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.versions.outputs.flutter-version }}
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Flutter analyze
        run: flutter analyze --no-pub --fatal-infos

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=opencrafts-io_academia
            -Dsonar.sources=lib
            -Dsonar.tests=test
            -Dsonar.flutter.version=${{ steps.versions.outputs.flutter-version }}

  android:
    name: 🤖 Android Production
    runs-on: ubuntu-latest
    needs: lint-and-scan
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Load tool versions
        id: versions
        uses: ./.github/actions/load-tool-versions

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.versions.outputs.java-version }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.versions.outputs.flutter-version }}
          cache: true
          cache-key: flutter-${{ steps.versions.outputs.flutter-version }}-${{ hashFiles('pubspec.lock') }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.versions.outputs.ruby-version }}
          bundler-cache: true
          working-directory: android

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Fastlane — Deploy to Play Store
        working-directory: android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_PLAY_JSON_KEY_PATH: ${{ runner.temp }}/play-key.json
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          echo '${{ secrets.GOOGLE_PLAY_JSON_KEY }}' > ${{ runner.temp }}/play-key.json
          bundle exec fastlane deploy_production

      - name: Notify Discord — Android Prod Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"embeds":[{"title":"✅ Academia Android Production Released","color":3066993,"fields":[{"name":"Branch","value":"main"},{"name":"Commit","value":"${{ github.sha }}"},{"name":"Actor","value":"${{ github.actor }}"}]}]}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord — Android Prod Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"embeds":[{"title":"❌ Academia Android Production FAILED","color":15158332,"fields":[{"name":"Run","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  ios:
    name: 🍎 iOS Production
    runs-on: macos-15
    needs: lint-and-scan
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Load tool versions
        id: versions
        uses: ./.github/actions/load-tool-versions

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.versions.outputs.flutter-version }}
          cache: true
          cache-key: flutter-${{ steps.versions.outputs.flutter-version }}-${{ hashFiles('pubspec.lock') }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.versions.outputs.ruby-version }}
          bundler-cache: true
          working-directory: ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Fastlane — Screenshots + Deploy to App Store
        working-directory: ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          bundle exec fastlane screenshots
          bundle exec fastlane deploy_production

      - name: Notify Discord — iOS Prod Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"embeds":[{"title":"✅ Academia iOS Production Released","color":3066993,"fields":[{"name":"Branch","value":"main"},{"name":"Commit","value":"${{ github.sha }}"}]}]}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord — iOS Prod Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"embeds":[{"title":"❌ Academia iOS Production FAILED","color":15158332,"fields":[{"name":"Run","value":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
