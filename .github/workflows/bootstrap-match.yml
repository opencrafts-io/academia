# .github/workflows/bootstrap-match.yml
name: Bootstrap Match

on:
  push:
    branches:
      - feature/add-fastlane

jobs:
  bootstrap:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Load tool versions
        id: versions
        uses: ./.github/actions/load-tool-versions

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.versions.outputs.ruby-version }}
          bundler-cache: true
          working-directory: ios

      - name: Generate and store certs (write mode)
        working-directory: ios
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane bootstrap_match
