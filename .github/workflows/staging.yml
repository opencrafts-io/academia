name: Staging — Build & Release

on:
  push:
    branches: [feature/add-fastlane]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from (leave empty for current branch)"
        required: false
        default: ""

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android — Staging APK
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Load tool versions
        id: versions
        uses: ./.github/actions/load-tool-versions

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Install gems (Bundler cache)
        working-directory: android
        run: bundle install
        env:
          BUNDLE_FROZEN: "true"

      - name: Cache gems
        uses: actions/cache@v4
        with:
          path: android/vendor/bundle
          key: gems-android-${{ hashFiles('android/Gemfile.lock') }}
          restore-keys: gems-android-

      - name: Flutter pub get
        run: flutter pub get

      - name: Fastlane — Upload Staging Release
        working-directory: android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: bundle exec fastlane upload_staging_release

      - name: Notify Discord — Failure
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ Android Staging FAILED\",\"color\":15158332,\"fields\":[{\"name\":\"Branch\",\"value\":\"${{ github.ref_name }}\"},{\"name\":\"Run\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  ios:
    name: iOS — Staging IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Load tool versions
        id: versions
        uses: ./.github/actions/load-tool-versions

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          xcodebuild -version

      - name: Install gems (Bundler cache)
        working-directory: ios
        run: bundle install

      - name: Cache gems
        uses: actions/cache@v4
        with:
          path: ios/vendor/bundle
          key: gems-ios-${{ hashFiles('ios/Gemfile.lock') }}
          restore-keys: gems-ios-

      - name: Flutter pub get
        run: flutter pub get

      - name: Fastlane — Upload Staging Release
        working-directory: ios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane upload_staging_release

      - name: Notify Discord — Failure
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ iOS Staging FAILED\",\"color\":15158332,\"fields\":[{\"name\":\"Branch\",\"value\":\"${{ github.ref_name }}\"},{\"name\":\"Run\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
