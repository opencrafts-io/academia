name: Asset Consistency Check
on:
  pull_request:
    branches: 
      - main
      - staging
      - 'platform/apple'

jobs:
  check-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Regenerate Assets
        # The --delete-conflicting-outputs flag is vital to prevent 
        # the build from hanging on stale cache files.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify Git Status
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "-------------------------------------------------------"
            echo "❌ ERROR: Generated files do not match pubspec.yaml"
            echo "Please run 'dart run build_runner build' and commit changes."
            echo "-------------------------------------------------------"
            git status
            exit 1
          else
            echo "✅ Assets are synchronized."
          fi
